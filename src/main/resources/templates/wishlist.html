<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ojasvi - Wishlist</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon_io/favicon.ico}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:opsz,wght@8..144,400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        :root {
            --primary: #C5A47E;
            --primary-dark: #AE7F4D;
            --primary-light: #E6C9A8;
            --brown: #5C3013;
            --brown-deep: #3a1d0b;
            --bg: #F5F1EB;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #888;
            --border: #EDE8E0;
            --success: #0F9D8A;
            --danger: #A32D2D;
        }

        h1, h2, h3, h4 { font-family: 'Roboto Serif', serif; }

        /* ═══════════ PAGE WRAPPER ═══════════ */
        .wishlist-page {
            padding: 130px 6% 60px;
            background: var(--bg);
            min-height: 80vh;
            max-width: 1280px;
            margin: 0 auto;
        }

        .wishlist-page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .wishlist-page-header .tag {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary-dark);
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .wishlist-page-header h2 {
            font-size: 32px;
            color: var(--text);
        }

        .wishlist-page-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
        }

        /* ═══════════ GRID ═══════════ */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        /* ═══════════ CARD ═══════════ */
        .wishlist-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transition: transform .25s, box-shadow .25s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.04);
        }

        .wishlist-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.1);
        }

        .wishlist-card-img-wrap {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .wishlist-card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .5s ease;
        }

        .wishlist-card:hover .wishlist-card-img-wrap img {
            transform: scale(1.08);
        }

        .wishlist-card-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0ece4;
        }

        .wishlist-card-img-placeholder i { font-size: 36px; color: var(--primary); }

        .wishlist-remove-icon {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--danger);
            font-size: 14px;
            transition: all .2s;
            z-index: 2;
        }

        .wishlist-remove-icon:hover {
            background: var(--danger);
            color: #fff;
            transform: scale(1.08);
        }

        .wishlist-card-body { padding: 16px 18px 18px; }

        .wishlist-card-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--primary-dark);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .wishlist-card-body h3 {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
            min-height: 38px;
        }

        .wishlist-price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 14px;
        }

        .wishlist-price-current {
            font-family: 'Roboto Serif', serif;
            font-size: 18px;
            color: var(--brown);
            font-weight: 600;
        }

        .wishlist-price-old {
            font-size: 13px;
            color: #bbb;
            text-decoration: line-through;
        }

        .wishlist-stock-note {
            font-size: 11.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .wishlist-stock-note.ok { color: var(--success); }
        .wishlist-stock-note.out { color: var(--danger); }

        .wishlist-actions {
            display: flex;
            gap: 10px;
        }

        .wishlist-view-btn {
            flex: 1;
            text-align: center;
            padding: 11px;
            background: var(--brown);
            color: var(--primary);
            text-decoration: none;
            border-radius: 24px;
            font-size: 12.5px;
            font-weight: 600;
            transition: all .2s;
            letter-spacing: .2px;
        }

        .wishlist-view-btn:hover {
            background: var(--primary-dark);
            color: #fff;
        }

        .wishlist-cart-btn {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--brown);
            font-size: 14px;
            cursor: pointer;
            transition: all .2s;
        }

        .wishlist-cart-btn:hover {
            border-color: var(--primary);
            background: rgba(197,164,126,0.1);
        }

        .wishlist-cart-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ═══════════ EMPTY STATE ═══════════ */
        .empty-wishlist {
            text-align: center;
            padding: 90px 30px;
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
        }

        .empty-wishlist .icon-wrap {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            background: rgba(197,164,126,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .empty-wishlist .icon-wrap i { font-size: 34px; color: var(--primary-dark); }

        .empty-wishlist h3 {
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-wishlist p {
            color: var(--text-muted);
            margin-bottom: 26px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .empty-wishlist .btn-shop {
            display: inline-block;
            padding: 13px 32px;
            background: var(--brown);
            color: var(--primary);
            text-decoration: none;
            border-radius: 30px;
            font-size: 13.5px;
            font-weight: 600;
            letter-spacing: .3px;
            transition: all .25s;
        }

        .empty-wishlist .btn-shop:hover {
            background: var(--primary-dark);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ═══════════ TOAST ═══════════ */
        #wl-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--brown);
            color: var(--primary);
            padding: 11px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
        }

        #wl-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ═══════════ RESPONSIVE ═══════════ */
        @media (max-width: 560px) {
            .wishlist-page { padding: 110px 5% 40px; }
            .wishlist-page-header h2 { font-size: 26px; }
            .wishlist-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        }
    </style>
</head>

<body>

    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <section class="wishlist-page">

        <div class="wishlist-page-header">
            <span class="tag">Saved For Later</span>
            <h2>My Wishlist</h2>
            <p th:if="${wishlistItems != null and !#lists.isEmpty(wishlistItems)}"
               th:text="${#lists.size(wishlistItems)} + ' item(s) you love'">
                items saved
            </p>
        </div>

        <!-- ═══════════ WISHLIST ITEMS ═══════════ -->
        <div class="wishlist-grid" th:if="${wishlistItems != null and !#lists.isEmpty(wishlistItems)}">

            <div class="wishlist-card" th:each="item : ${wishlistItems}">

                <div class="wishlist-card-img-wrap">
                    <a th:href="@{'/product/' + ${item.slug}}">
                        <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" th:alt="${item.productName}">
                        <div class="wishlist-card-img-placeholder" th:if="${item.imageUrl == null}">
                            <i class="fa-regular fa-image"></i>
                        </div>
                    </a>
                    <button class="wishlist-remove-icon" th:attr="onclick=|removeFromWishlist(${item.productId}, this)|" title="Remove">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="wishlist-card-body">
                    <div class="wishlist-card-category" th:if="${item.category != null}" th:text="${item.category}">Category</div>

                    <h3 th:text="${item.productName}">Product Name</h3>

                    <div class="wishlist-price-row">
                        <span class="wishlist-price-current"
                              th:text="'₹' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">
                            ₹0
                        </span>
                        <span class="wishlist-price-old"
                              th:if="${item.mrp != null and item.mrp > item.price}"
                              th:text="'₹' + ${#numbers.formatDecimal(item.mrp, 0, 'COMMA', 0, 'POINT')}">
                            ₹0
                        </span>
                    </div>

                    <div class="wishlist-stock-note ok" th:if="${item.stock != null and item.stock > 0}">
                        <i class="fa-solid fa-circle-check"></i> In Stock
                    </div>
                    <div class="wishlist-stock-note out" th:if="${item.stock == null or item.stock == 0}">
                        <i class="fa-solid fa-circle-xmark"></i> Out of Stock
                    </div>

                    <div class="wishlist-actions">
                        <a th:href="@{'/product/' + ${item.slug}}" class="wishlist-view-btn">
                            View Product
                        </a>
                        <button class="wishlist-cart-btn"
                                th:disabled="${item.stock == null or item.stock == 0}"
                                th:attr="onclick=|moveToCart(${item.productId})|"
                                title="Add to cart">
                            <i class="fa-solid fa-bag-shopping"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ EMPTY STATE ═══════════ -->
        <div class="empty-wishlist" th:if="${wishlistItems == null or #lists.isEmpty(wishlistItems)}">
            <div class="icon-wrap">
                <i class="fa-solid fa-heart"></i>
            </div>
            <h3>Your Wishlist is Empty</h3>
            <p>Save the pieces you love and come back to them anytime.</p>
            <a th:href="@{/shop}" class="btn-shop">
                <i class="fa-solid fa-arrow-left" style="margin-right:6px;"></i> Explore Products
            </a>
        </div>

    </section>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <div id="wl-toast"></div>

    <script th:src="@{/js/script.js}"></script>
    <script>
        function removeFromWishlist(productId, btn) {
            fetch('/api/wishlist/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId })
            })
            .then(r => r.json())
            .then(data => {
                const card = btn.closest('.wishlist-card');
                card.style.transition = 'opacity .3s, transform .3s';
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    card.remove();
                    if (document.querySelectorAll('.wishlist-card').length === 0) {
                        location.reload();
                    }
                }, 300);
                showWlToast(data.message || 'Removed from wishlist');
            })
            .catch(() => showWlToast('Failed to remove item'));
        }

        function moveToCart(productId) {
            fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId, quantity: 1 })
            })
            .then(r => r.json())
            .then(data => showWlToast(data.message || 'Added to cart'))
            .catch(() => showWlToast('Please login to add items to cart'));
        }

        let wlToastTimer;
        function showWlToast(msg) {
            const t = document.getElementById('wl-toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(wlToastTimer);
            wlToastTimer = setTimeout(() => t.classList.remove('show'), 2600);
        }
    </script>

</body>

</html>
